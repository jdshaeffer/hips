name: Deploy Server to EC2 via SSM

on:
  push:
    branches:
      - master
    paths:
      - "server/**"
      - "models/**"
      - "deploy/ec2/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-server-ssm.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Trigger SSM deployment command
        id: ssm
        env:
          EC2_TAG_KEY: ${{ vars.EC2_TAG_KEY }}
          EC2_TAG_VALUE: ${{ vars.EC2_TAG_VALUE }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy hips server from GitHub Actions" \
            --targets "Key=tag:${EC2_TAG_KEY},Values=${EC2_TAG_VALUE}" \
            --parameters 'commands=["cd /opt/hips-server","bash deploy/ec2/deploy.sh"]' \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "SSM Command ID: ${COMMAND_ID}"

      - name: Wait for SSM command completion
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
          EC2_TAG_KEY: ${{ vars.EC2_TAG_KEY }}
          EC2_TAG_VALUE: ${{ vars.EC2_TAG_VALUE }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:${EC2_TAG_KEY},Values=${EC2_TAG_VALUE}" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No running instance found for target tag ${EC2_TAG_KEY}=${EC2_TAG_VALUE}"
            exit 1
          fi

          for attempt in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text || true)
            echo "Attempt $attempt: status=$STATUS"

            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "{StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
                --output json
              exit 0
            fi

            if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Failed" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "{StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
                --output json
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for SSM command completion."
          exit 1
